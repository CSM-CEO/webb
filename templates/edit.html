<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование привычки</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Редактировать привычку</h3>
                <form action="/habit/edit/{{ habit.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Название</label>
                        <input type="text" name="title" class="form-control" value="{{ habit.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <input type="text" name="description" class="form-control" value="{{ habit.description }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Статус</label>
                        <select name="status" class="form-select">
                            <option value="active" {% if habit.status == 'active' %}selected{% endif %}>Активная (Сбросить отметку)</option>
                            <option value="completed" {% if habit.status == 'completed' %}selected{% endif %}>Выполнена на сегодня</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1">Сохранить</button>
                        <a href="/" class="btn btn-secondary">Назад</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
