<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Трекер привычек</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 800px;">
        <h1 class="text-center mb-4">🎯 Трекер Моих Привычек</h1>

        <!-- Форма создания привычки -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form action="/habit/add" method="POST" class="row g-2">
                    <div class="col-md-5">
                        <input type="text" name="title" class="form-control" placeholder="Название привычки" required>
                    </div>
                    <div class="col-md-5">
                        <input type="text" name="description" class="form-control" placeholder="Описание (например, каждый день)">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">Добавить</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Поиск и фильтрация -->
        <form method="GET" action="/" class="row g-2 mb-4">
            <div class="col-md-6">
                <input type="text" name="search" class="form-control" placeholder="Поиск привычки..." value="{{ search }}">
            </div>
            <div class="col-md-4">
                <select name="status" class="form-select">
                    <option value="all" {% if current_status == 'all' %}selected{% endif %}>Все привычки</option>
                    <option value="active" {% if current_status == 'active' %}selected{% endif %}>🔥 Активные</option>
                    <option value="completed" {% if current_status == 'completed' %}selected{% endif %}>✅ Выполненные сегодня</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Фильтр</button>
            </div>
        </form>

        <!-- Список привычек -->
        <div class="list-group shadow-sm">
            {% for habit in habits %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1 {% if habit.status == 'completed' %}text-decoration-line-through text-muted{% endif %}">
                        {{ habit.title }}
                    </h5>
                    <p class="mb-1 text-muted small">{{ habit.description }}</p>
                    <span class="badge bg-warning text-dark">🔥 Серия: {{ habit.streak }} дней</span>
                </div>
                <div class="d-flex gap-2">
                    {% if habit.status != 'completed' %}
                    <form action="/habit/check/{{ habit.id }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-success">Выполнить</button>
                    </form>
                    {% endif %}
                    <a href="/habit/edit/{{ habit.id }}" class="btn btn-sm btn-outline-secondary">Изменить</a>
                    <form action="/habit/delete/{{ habit.id }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить привычку?')">Удалить</button>
                    </form>
                </div>
            </div>
            {% else %}
            <div class="list-group-item text-center p-4 text-muted">Привычек пока нет. Самое время завести первую!</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
